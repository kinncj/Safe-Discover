name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  source:
    name: Source tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "TAG_VERSION=${TAG_VERSION}" >> "$GITHUB_ENV"

      - name: Create source tarball
        run: |
          git archive --format=tar.gz --prefix=safe-discover-${TAG_VERSION}/ \
            -o safe-discover-${TAG_VERSION}.tar.gz HEAD

      - name: Upload source tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: safe-discover-*.tar.gz

  package-x86_64:
    name: Package (x86_64)
    runs-on: ubuntu-latest
    container: cachyos/cachyos-v3:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel cmake extra-cmake-modules gcc \
            qt6-base qt6-declarative \
            kirigami kirigami-addons \
            kcoreaddons ki18n kconfig knewstuff \
            polkit

      - name: Set release version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "TAG_VERSION=${TAG_VERSION}" >> "$GITHUB_ENV"
          sed -i "s/^pkgver=.*/pkgver=${TAG_VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Build & test package
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          su builder -c "BUILDDIR=/tmp/makepkg-build makepkg -sf --noconfirm --check"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: package-x86_64
          path: safe-discover-*.pkg.tar.zst

  package-aarch64:
    name: Package (aarch64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Extract version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "TAG_VERSION=${TAG_VERSION}" >> "$GITHUB_ENV"

      - name: Build in ARM container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/src \
            -e TAG_VERSION="${TAG_VERSION}" \
            lscr.io/linuxserver/archlinux:latest \
            bash -c '
              set -e
              pacman -Syu --noconfirm --needed \
                base-devel cmake extra-cmake-modules gcc \
                qt6-base qt6-declarative \
                kirigami kirigami-addons \
                kcoreaddons ki18n kconfig knewstuff \
                polkit

              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

              cp -r /src /build && chown -R builder:builder /build
              cd /build

              sed -i "s/^pkgver=.*/pkgver=${TAG_VERSION}/" PKGBUILD
              sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
              su builder -c "BUILDDIR=/tmp/makepkg-build makepkg -sf --noconfirm --check"

              cp safe-discover-*.pkg.tar.zst /src/
            '
        continue-on-error: true

      - name: Upload package
        if: hashFiles('safe-discover-*.pkg.tar.zst') != ''
        uses: actions/upload-artifact@v4
        with:
          name: package-aarch64
          path: safe-discover-*.pkg.tar.zst

  upload-assets:
    name: Upload release assets
    needs: [source, package-x86_64, package-aarch64]
    if: always() && needs.source.result == 'success' && needs.package-x86_64.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la safe-discover-*

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: safe-discover-*
